<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>פרופיל — social-app</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
    }
    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot-r { background: #ff5f57; }
    .dot-y { background: #febc2e; }
    .dot-g { background: #28c840; }
    .header-title { color: #8b949e; font-size: 13px; margin: 0 auto; }
    .back-btn {
      color: #28c840;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #28c84044;
      padding: 4px 12px;
      border-radius: 4px;
      background: none;
      font-family: inherit;
    }
    .back-btn:hover { background: #28c84015; }
    .container { max-width: 640px; margin: 30px auto; padding: 0 16px; }

    .profile-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .profile-top {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }
    .avatar-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid #28c840;
      object-fit: cover;
      cursor: pointer;
      background: #0d1117;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
    .profile-info { flex: 1; }
    .profile-username { color: #28c840; font-size: 18px; font-weight: bold; margin-bottom: 6px; }
    .profile-joined { color: #8b949e; font-size: 11px; margin-bottom: 10px; }
    .profile-stats { display: flex; gap: 20px; }
    .stat { text-align: center; }
    .stat-num { color: #28c840; font-size: 18px; font-weight: bold; }
    .stat-label { color: #8b949e; font-size: 11px; }

    .bio-section { border-top: 1px solid #30363d; padding-top: 16px; }
    .bio-label { color: #8b949e; font-size: 11px; margin-bottom: 8px; }
    .bio-text { color: #c9d1d9; font-size: 13px; line-height: 1.6; min-height: 20px; }
    .edit-bio { display: none; width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 4px; color: #c9d1d9; font-family: 'Courier New', monospace; font-size: 13px; padding: 8px; outline: none; resize: none; height: 70px; direction: rtl; margin-bottom: 8px; }
    .edit-bio:focus { border-color: #28c840; }
    .btn-row { display: flex; gap: 8px; margin-top: 12px; }
    .btn {
      background: #28c84015;
      color: #28c840;
      border: 1px solid #28c84055;
      border-radius: 4px;
      padding: 6px 16px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover { background: #28c84030; }
    .btn-gray {
      background: none;
      color: #8b949e;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 6px 16px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      cursor: pointer;
    }

    .posts-section { margin-top: 10px; }
    .section-title { color: #8b949e; font-size: 12px; margin-bottom: 14px; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
    .post-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .post-time { color: #8b949e; font-size: 11px; margin-bottom: 8px; }
    .post-content { color: #c9d1d9; font-size: 13px; line-height: 1.6; }
    .post-content::before { content: '> '; color: #28c84066; }

    #avatar-input { display: none; }
  </style>
</head>
<body>
  <header>
    <div class="dot dot-r"></div>
    <div class="dot dot-y"></div>
    <div class="dot dot-g"></div>
    <span class="header-title" id="header-title">profile — social-app</span>
    <button class="back-btn" onclick="window.location.href='/index.html'">› חזור</button>
  </header>

  <div class="container">
    <div class="profile-card">
      <div class="profile-top">
        <div class="avatar-circle" id="avatarCircle" onclick="document.getElementById('avatar-input').click()">
          👤
        </div>
        <input type="file" id="avatar-input" accept="image/*" onchange="uploadAvatar(this)">
        <div class="profile-info">
          <div class="profile-username" id="profileUsername"></div>
          <div class="profile-joined" id="profileJoined"></div>
          <div class="profile-stats">
            <div class="stat">
              <div class="stat-num" id="postCount">0</div>
              <div class="stat-label">פוסטים</div>
            </div>
          </div>
        </div>
      </div>
      <div class="bio-section">
        <div class="bio-label">// ביוגרפיה</div>
        <div class="bio-text" id="bioText">אין ביוגרפיה עדיין...</div>
        <textarea class="edit-bio" id="bioInput" placeholder="ספר על עצמך..."></textarea>
        <div class="btn-row" id="editBtns" style="display:none">
          <button class="btn" onclick="saveBio()">› שמור</button>
          <button class="btn-gray" onclick="cancelEdit()">ביטול</button>
        </div>
        <div class="btn-row" id="editTrigger">
          <button class="btn" onclick="startEdit()">› ערוך ביוגרפיה</button>
        </div>
      </div>
    </div>

    <div class="posts-section">
      <div class="section-title">// פוסטים אחרונים</div>
      <div id="profilePosts"></div>
    </div>
  </div>

  <script>
    let currentUser = null;

    async function init() {
      const meRes = await fetch('/api/me');
      const meData = await meRes.json();
      if (!meData.user) { window.location.href = '/login.html'; return; }
      currentUser = meData.user;

      const res = await fetch(`/api/profile/${currentUser.username}`);
      const profile = await res.json();

      document.getElementById('header-title').textContent = `${profile.username}@network — profile`;
      document.getElementById('profileUsername').textContent = `[${profile.username}@network]`;
      document.getElementById('profileJoined').textContent = `נרשם: ${new Date(profile.created_at).toLocaleDateString('he-IL')}`;
      document.getElementById('postCount').textContent = profile.postCount;

      if (profile.bio) document.getElementById('bioText').textContent = profile.bio;
      if (profile.avatar) {
        document.getElementById('avatarCircle').innerHTML = `<img src="${profile.avatar}">`;
      }

      loadProfilePosts();
    }

    async function loadProfilePosts() {
      const res = await fetch('/api/posts');
      const posts = await res.json();
      const myPosts = posts.filter(p => p.author === currentUser.username);
      const container = document.getElementById('profilePosts');
      container.innerHTML = '';
      if (myPosts.length === 0) {
        container.innerHTML = '<div style="color:#8b949e;font-size:12px;text-align:center;padding:20px">// אין פוסטים עדיין</div>';
        return;
      }
      myPosts.forEach(post => {
        const time = new Date(post.created_at).toLocaleDateString('he-IL');
        container.insertAdjacentHTML('beforeend', `
          <div class="post-card">
            <div class="post-time">${time}</div>
            <div class="post-content">${post.content}</div>
          </div>
        `);
      });
    }

    function startEdit() {
      document.getElementById('bioInput').style.display = 'block';
      document.getElementById('bioInput').value = document.getElementById('bioText').textContent === 'אין ביוגרפיה עדיין...' ? '' : document.getElementById('bioText').textContent;
      document.getElementById('editBtns').style.display = 'flex';
      document.getElementById('editTrigger').style.display = 'none';
    }

    function cancelEdit() {
      document.getElementById('bioInput').style.display = 'none';
      document.getElementById('editBtns').style.display = 'none';
      document.getElementById('editTrigger').style.display = 'flex';
    }

    async function saveBio() {
      const bio = document.getElementById('bioInput').value.trim();
      await fetch('/api/profile', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bio })
      });
      document.getElementById('bioText').textContent = bio || 'אין ביוגרפיה עדיין...';
      cancelEdit();
    }

    async function uploadAvatar(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async (e) => {
        const base64 = e.target.result;
        await fetch('/api/avatar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ avatar: base64 })
        });
        document.getElementById('avatarCircle').innerHTML = `<img src="${base64}">`;
      };
      reader.readAsDataURL(file);
    }

    init();
  </script>
</body>
</html>=
